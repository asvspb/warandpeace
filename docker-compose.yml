version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: warandpeace-bot
    env_file:
      - .env
    volumes:
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
